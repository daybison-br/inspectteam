services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inspecteam}
      POSTGRES_USER: ${POSTGRES_USER:-inspecteam_owner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inspecteam_local_password}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inspecteam_owner} -d ${POSTGRES_DB:-inspecteam}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-inspecteam}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-inspecteam_local_password}
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
