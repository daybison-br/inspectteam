spring:
  application:
    name: inspecteam-api
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/inspecteam}
    username: ${DATABASE_USERNAME:${POSTGRES_USER:inspecteam_owner}}
    password: ${DATABASE_PASSWORD:${POSTGRES_PASSWORD:inspecteam_local_password}}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  jackson:
    default-property-inclusion: non_null
  mvc:
    problemdetails:
      enabled: true

server:
  shutdown: graceful
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

inspecteam:
  security:
    jwt-secret: ${JWT_SECRET:local-development-secret-change-before-production}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    bucket: ${STORAGE_BUCKET:inspecteam}
    access-key: ${STORAGE_ACCESS_KEY:${MINIO_ROOT_USER:inspecteam}}
    secret-key: ${STORAGE_SECRET_KEY:${MINIO_ROOT_PASSWORD:inspecteam_local_password}}
